[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_SUPABASE_ANON_KEY is an intentionally public JWT embedded in the
  # client bundle — Netlify's scanner incorrectly flags it as a secret.
  SECRETS_SCAN_ENABLED = "false"

# Serve Next.js static chunks with correct MIME types.
# Without this, Netlify may serve .js files as text/plain causing
# "Server Action not found" errors (action registry chunk fails to load).
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Next.js Runtime handles middleware, SSR, API routes automatically.
# The plugin below is auto-installed by Netlify when it detects Next.js,
# but declaring it explicitly ensures correct behavior.
[[plugins]]
  package = "@netlify/plugin-nextjs"
