[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_SUPABASE_ANON_KEY is an intentionally public JWT embedded in the
  # client bundle — Netlify's scanner incorrectly flags it as a secret.
  SECRETS_SCAN_ENABLED = "false"

# ── Correct MIME types for Next.js static assets ───────────────────────────
# @netlify/plugin-nextjs should handle this, but explicit rules act as fallback.
[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Netlify Next.js Runtime ─────────────────────────────────────────────────
# Handles SSR, middleware, server actions, and API routes.
[[plugins]]
  package = "@netlify/plugin-nextjs"
